version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(trace_id)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

filters:
  trace_id:
    "()": src.common.logger.TraceIdFilter

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    filters: [trace_id]
    stream: ext://sys.stdout

  app_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filters: [trace_id]
    filename: logs/app.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: standard
    filters: [trace_id]
    filename: logs/error.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

  crawler_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filters: [trace_id]
    filename: logs/crawler.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

  etl_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filters: [trace_id]
    filename: logs/etl.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

  analysis_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filters: [trace_id]
    filename: logs/analysis.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  app:
    level: INFO
    handlers: [console, app_file, error_file]
    propagate: false

  crawler:
    level: INFO
    handlers: [console, crawler_file, error_file]
    propagate: false

  etl:
    level: INFO
    handlers: [console, etl_file, error_file]
    propagate: false

  analysis:
    level: INFO
    handlers: [console, analysis_file, error_file]
    propagate: false

root:
  level: INFO
  handlers: [console, app_file, error_file]
