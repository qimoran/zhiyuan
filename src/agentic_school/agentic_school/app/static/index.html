<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考研择校助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-bottom: 20px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-title .step {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            margin-right: 10px;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
        }

        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e9ecef;
            transition: all 0.3s;
        }

        .progress-dot.active {
            background: #667eea;
            transform: scale(1.2);
        }

        .progress-dot.completed {
            background: #28a745;
        }

        .result-section {
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .school-card {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .school-card:hover {
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .school-card.chong {
            border-left: 4px solid #dc3545;
        }

        .school-card.wen {
            border-left: 4px solid #ffc107;
        }

        .school-card.bao {
            border-left: 4px solid #28a745;
        }

        .school-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .school-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .school-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-chong {
            background: #ffebee;
            color: #dc3545;
        }

        .tag-wen {
            background: #fff8e1;
            color: #f57c00;
        }

        .tag-bao {
            background: #e8f5e9;
            color: #28a745;
        }

        .match-score {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .match-score.high {
            background: #e8f5e9;
            color: #28a745;
        }

        .match-score.medium {
            background: #fff8e1;
            color: #f57c00;
        }

        .match-score.low {
            background: #ffebee;
            color: #dc3545;
        }

        .analyze-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .analyze-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .analysis-content {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .school-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .score-diff {
            font-size: 14px;
        }

        .score-diff.positive {
            color: #dc3545;
        }

        .score-diff.negative {
            color: #28a745;
        }

        .category-title {
            font-size: 18px;
            font-weight: 600;
            margin: 25px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-title .icon {
            font-size: 20px;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .chat-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s;
        }

        .chat-toggle:hover {
            transform: scale(1.1);
        }

        .chat-modal {
            display: none;
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 380px;
            height: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            flex-direction: column;
            overflow: hidden;
        }

        .chat-modal.active {
            display: flex;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #e9ecef;
            border-radius: 20px;
            font-size: 14px;
        }

        .chat-input-area button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .chat-message {
            margin-bottom: 12px;
        }

        .chat-message.user {
            text-align: right;
        }

        .chat-message .content {
            display: inline-block;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.5;
        }

        .chat-message.assistant .content {
            background: white;
            text-align: left;
        }

        .chat-message.user .content {
            background: #667eea;
            color: white;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .summary-title {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .summary-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-item .label {
            font-size: 12px;
            opacity: 0.8;
        }

        .summary-item .value {
            font-size: 16px;
            font-weight: 600;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>重庆考研择校助手</h1>
            <p>专注重庆地区，智能分析冲稳保院校</p>
        </div>

        <div id="formPage">
            <div class="progress-bar">
                <div class="progress-dot active" data-step="1"></div>
                <div class="progress-dot" data-step="2"></div>
                <div class="progress-dot" data-step="3"></div>
            </div>

            <div class="card form-section active" data-step="1">
                <div class="form-title"><span class="step">1</span>基本信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>本科学校</label>
                        <input type="text" id="undergraduateSchool" placeholder="请输入本科学校名称">
                    </div>
                    <div class="form-group">
                        <label>本科专业</label>
                        <input type="text" id="undergraduateMajor" placeholder="请输入本科专业">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>考研年份</label>
                        <select id="examYear">
                            <option value="2025">2025年</option>
                            <option value="2026" selected>2026年</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>考生类型</label>
                        <select id="studentType">
                            <option value="normal">应届生</option>
                            <option value="repeat">往届生/二战</option>
                        </select>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="nextStep(2)">下一步</button>
                </div>
            </div>

            <div class="card form-section" data-step="2">
                <div class="form-title"><span class="step">2</span>目标信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>目标专业门类</label>
                        <select id="majorCategory">
                            <option value="">请选择</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>目标专业</label>
                        <input type="text" id="targetMajor" placeholder="如：计算机技术、人工智能">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>学位类型</label>
                        <select id="degreeType" onchange="loadCategories()">
                            <option value="professional">专业型硕士</option>
                            <option value="academic">学术型硕士</option>
                            <option value="">不限</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>学习方式</label>
                        <select id="studyMode">
                            <option value="full_time">全日制</option>
                            <option value="part_time">非全日制</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>目标区域</label>
                        <select id="targetProvince">
                            <option value="重庆" selected>重庆</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>目标城市</label>
                        <input type="text" id="targetCity" placeholder="如：渝北区、沙坪坝" value="重庆">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="prevStep(1)">上一步</button>
                    <button class="btn btn-primary" onclick="nextStep(3)">下一步</button>
                </div>
            </div>

            <div class="card form-section" data-step="3">
                <div class="form-title"><span class="step">3</span>分数与偏好</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>预估总分</label>
                        <input type="number" id="estimatedScore" placeholder="如：350" min="200" max="500">
                    </div>
                    <div class="form-group">
                        <label>学校层次偏好</label>
                        <select id="schoolLevel">
                            <option value="">不限</option>
                            <option value="985">985院校</option>
                            <option value="211">211院校</option>
                            <option value="双一流">双一流</option>
                            <option value="普通">普通院校</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>学校类型偏好</label>
                        <select id="schoolType">
                            <option value="">不限</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>风险偏好</label>
                        <select id="riskPreference">
                            <option value="balanced">均衡型（冲稳保各3所）</option>
                            <option value="aggressive">冲刺型（冲5稳3保1）</option>
                            <option value="conservative">保守型（冲1稳3保5）</option>
                        </select>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="prevStep(2)">上一步</button>
                    <button class="btn btn-primary" onclick="submitForm()">开始分析</button>
                </div>
            </div>
        </div>

        <div id="resultPage" class="result-section">
            <div class="card">
                <div class="loading" id="loadingSection">
                    <div class="loading-spinner"></div>
                    <p>正在智能分析中...</p>
                </div>

                <div id="resultContent" style="display: none;">
                    <div class="summary-card">
                        <div class="summary-title">您的择校需求</div>
                        <div class="summary-items" id="summaryItems"></div>
                    </div>
                    <div id="schoolsResult"></div>
                    <div class="btn-group" style="margin-top: 30px;">
                        <button class="btn btn-secondary" onclick="resetForm()">重新选择</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="chat-toggle" onclick="toggleChat()">💬</button>

    <div class="chat-modal" id="chatModal">
        <div class="chat-header">AI 择校顾问</div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-message assistant">
                <div class="content">你好！我是AI择校顾问，有任何关于择校的问题都可以问我。</div>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="输入问题..." onkeypress="handleChatKeyPress(event)">
            <button onclick="sendChatMessage()">发送</button>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let sessionId = null;

        async function loadOptions() {
            try {
                const [provincesRes, typesRes] = await Promise.all([
                    fetch('/api/provinces'),
                    fetch('/api/school-types')
                ]);

                const provinces = await provincesRes.json();
                const types = await typesRes.json();

                const provinceSelect = document.getElementById('targetProvince');
                provinces.provinces.forEach(p => {
                    provinceSelect.innerHTML += `<option value="${p}">${p}</option>`;
                });

                const typeSelect = document.getElementById('schoolType');
                types.types.forEach(t => {
                    typeSelect.innerHTML += `<option value="${t}">${t}</option>`;
                });
                
                loadCategories();
            } catch (error) {
                console.error('加载选项失败:', error);
            }
        }
        
        async function loadCategories() {
            const degreeType = document.getElementById('degreeType').value;
            const categorySelect = document.getElementById('majorCategory');
            categorySelect.innerHTML = '<option value="">请选择</option>';
            
            try {
                const url = degreeType ? `/api/categories?degree_type=${degreeType}` : '/api/categories';
                const response = await fetch(url);
                const categories = await response.json();
                
                categories.categories.forEach(c => {
                    categorySelect.innerHTML += `<option value="${c}">${c}</option>`;
                });
            } catch (error) {
                console.error('加载专业门类失败:', error);
            }
        }

        function nextStep(step) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.form-section[data-step="${step}"]`).classList.add('active');
            
            document.querySelectorAll('.progress-dot').forEach((dot, index) => {
                dot.classList.remove('active', 'completed');
                if (index + 1 < step) dot.classList.add('completed');
                if (index + 1 === step) dot.classList.add('active');
            });
            
            currentStep = step;
        }

        function prevStep(step) {
            nextStep(step);
        }

        async function submitForm() {
            const estimatedScore = document.getElementById('estimatedScore').value;
            if (!estimatedScore) {
                alert('请填写预估总分');
                return;
            }

            const formData = {
                undergraduate_school: document.getElementById('undergraduateSchool').value,
                undergraduate_major: document.getElementById('undergraduateMajor').value,
                exam_year: document.getElementById('examYear').value,
                student_type: document.getElementById('studentType').value,
                major_category: document.getElementById('majorCategory').value,
                target_major: document.getElementById('targetMajor').value,
                degree_type: document.getElementById('degreeType').value,
                study_mode: document.getElementById('studyMode').value,
                target_province: document.getElementById('targetProvince').value,
                target_city: document.getElementById('targetCity').value,
                estimated_score: parseInt(estimatedScore),
                school_level: document.getElementById('schoolLevel').value,
                school_type: document.getElementById('schoolType').value,
                risk_preference: document.getElementById('riskPreference').value
            };

            document.getElementById('formPage').style.display = 'none';
            document.getElementById('resultPage').classList.add('active');

            try {
                const response = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errText.substring(0, 200)}`);
                }

                const result = await response.json();
                displayResult(formData, result);
            } catch (error) {
                console.error('推荐失败:', error);
                alert('分析失败：' + error.message + '\n请按 Ctrl+F5 强制刷新后重试');
                document.getElementById('formPage').style.display = 'block';
                document.getElementById('resultPage').classList.remove('active');
            }
        }

        function displayResult(formData, result) {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('resultContent').style.display = 'block';

            const summaryItems = document.getElementById('summaryItems');
            summaryItems.innerHTML = `
                <div class="summary-item">
                    <div class="label">目标专业</div>
                    <div class="value">${formData.target_major || formData.major_category || '未指定'}</div>
                </div>
                <div class="summary-item">
                    <div class="label">预估分数</div>
                    <div class="value">${formData.estimated_score}分</div>
                </div>
                <div class="summary-item">
                    <div class="label">目标地区</div>
                    <div class="value">${formData.target_province || '全国'}</div>
                </div>
            `;

            const schoolsResult = document.getElementById('schoolsResult');
            
            if (result.chong && result.chong.length > 0) {
                schoolsResult.innerHTML += `
                    <div class="category-title"><span class="icon">🎯</span>冲刺院校</div>
                    ${result.chong.map(s => createSchoolCard(s, 'chong', formData.estimated_score)).join('')}
                `;
            }

            if (result.wen && result.wen.length > 0) {
                schoolsResult.innerHTML += `
                    <div class="category-title"><span class="icon">⚖️</span>稳妥院校</div>
                    ${result.wen.map(s => createSchoolCard(s, 'wen', formData.estimated_score)).join('')}
                `;
            }

            if (result.bao && result.bao.length > 0) {
                schoolsResult.innerHTML += `
                    <div class="category-title"><span class="icon">🛡️</span>保底院校</div>
                    ${result.bao.map(s => createSchoolCard(s, 'bao', formData.estimated_score)).join('')}
                `;
            }
        }

        function createSchoolCard(school, type, userScore) {
            const tagClass = type === 'chong' ? 'tag-chong' : type === 'wen' ? 'tag-wen' : 'tag-bao';
            const tagText = type === 'chong' ? '冲刺' : type === 'wen' ? '稳妥' : '保底';
            
            const scoreDiff = school.score_diff || 0;
            const diffClass = scoreDiff > 0 ? 'positive' : 'negative';
            const diffText = scoreDiff > 0 ? `+${scoreDiff}` : scoreDiff;
            
            const matchScore = school.match_score || 60;
            const matchClass = matchScore >= 80 ? 'high' : matchScore >= 60 ? 'medium' : 'low';
            
            const subjectScores = school.subject_scores || {};
            
            let subjectScoresHtml = '';
            if (subjectScores.politics_target) {
                subjectScoresHtml = `
                    ${school.exam_subjects ? `<div style="margin-top: 12px; padding: 10px 12px; background: #f8f9fa; border-radius: 6px; font-size: 12px; color: #555; line-height: 1.6;"><span style="color: #667eea; font-weight: 600;">考试科目：</span>${school.exam_subjects}</div>` : ''}
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #e9ecef;">
                        <div style="font-size: 13px; color: #666; margin-bottom: 8px;">各科目标分数 <span style="font-size: 11px; color: #999;">(线/目标)</span></div>
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center;">
                            <div>
                                <div style="font-size: 11px; color: #999;">政治</div>
                                <div style="font-size: 14px; font-weight: 600; color: #999;">${subjectScores.politics_line || '-'}</div>
                                <div style="font-size: 14px; font-weight: 700; color: #667eea; border-top: 1px dashed #ddd; padding-top: 4px; margin-top: 4px;">${subjectScores.politics_target || '-'}</div>
                            </div>
                            <div>
                                <div style="font-size: 11px; color: #999;">英语</div>
                                <div style="font-size: 14px; font-weight: 600; color: #999;">${subjectScores.english_line || '-'}</div>
                                <div style="font-size: 14px; font-weight: 700; color: #667eea; border-top: 1px dashed #ddd; padding-top: 4px; margin-top: 4px;">${subjectScores.english_target || '-'}</div>
                            </div>
                            <div>
                                <div style="font-size: 11px; color: #999;">专业课一</div>
                                <div style="font-size: 14px; font-weight: 600; color: #999;">${subjectScores.subject_one_line || '-'}</div>
                                <div style="font-size: 14px; font-weight: 700; color: #667eea; border-top: 1px dashed #ddd; padding-top: 4px; margin-top: 4px;">${subjectScores.subject_one_target || '-'}</div>
                            </div>
                            <div>
                                <div style="font-size: 11px; color: #999;">专业课二</div>
                                <div style="font-size: 14px; font-weight: 600; color: #999;">${subjectScores.subject_two_line || '-'}</div>
                                <div style="font-size: 14px; font-weight: 700; color: #667eea; border-top: 1px dashed #ddd; padding-top: 4px; margin-top: 4px;">${subjectScores.subject_two_target || '-'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            const cardId = `card-${school.id}-${type}`;

            return `
                <div class="school-card ${type}" id="${cardId}">
                    <div class="school-header">
                        <span class="school-name">${school.name}</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="match-score ${matchClass}">匹配度 ${matchScore}%</span>
                            <span class="school-tag ${tagClass}">${tagText}</span>
                        </div>
                    </div>
                    <div style="color: #666; font-size: 14px;">
                        ${school.province} · ${school.city} · ${school.level || '普通院校'}
                    </div>
                    <div class="school-info">
                        <div class="info-item">
                            <div class="info-label">复试线</div>
                            <div class="info-value">${school.score_line || '-'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">分差</div>
                            <div class="info-value score-diff ${diffClass}">${diffText}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">学科评估</div>
                            <div class="info-value">${school.subject_level || '-'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">匹配专业</div>
                            <div class="info-value">${school.matching_majors || '-'}</div>
                        </div>
                    </div>
                    ${subjectScoresHtml}
                    <div style="margin-top: 15px;">
                        <button class="analyze-btn" data-school='${JSON.stringify(school)}' data-score="${userScore}" onclick="analyzeSchool(this)">查看AI分析</button>
                    </div>
                    <div class="analysis-content" id="analysis-${cardId}" style="display: none;"></div>
                </div>
            `;
        }

        async function analyzeSchool(btn) {
            const cardDiv = btn.closest('.school-card');
            const cardId = cardDiv.id;
            const analysisDiv = document.getElementById(`analysis-${cardId}`);

            // 防止重复点击
            if (btn.dataset.loading === '1') return;

            // 切换显示/隐藏
            if (analysisDiv.style.display === 'block') {
                analysisDiv.style.display = 'none';
                btn.textContent = '查看AI分析';
                return;
            }

            let school;
            try {
                school = JSON.parse(btn.dataset.school);
            } catch (e) {
                analysisDiv.innerHTML = `<div style="color: #dc3545; padding: 15px;">数据解析失败，请刷新页面</div>`;
                analysisDiv.style.display = 'block';
                return;
            }
            const userScore = parseInt(btn.dataset.score);

            const originalText = btn.textContent;
            btn.textContent = '分析中...';
            btn.disabled = true;
            btn.dataset.loading = '1';

            // 60秒超时
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: controller.signal,
                    body: JSON.stringify({
                        school_name: school.name,
                        score_line: school.score_line || 0,
                        user_score: userScore,
                        match_score: school.match_score || 60,
                        subject_level: school.subject_level || null,
                        province: school.province || null,
                        level: school.level || null,
                        target_major: school.matching_majors || null
                    })
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.analysis) {
                    const formattedAnalysis = data.analysis
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
                    analysisDiv.innerHTML = `<div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 14px; line-height: 1.6;">${formattedAnalysis}</div>`;
                    analysisDiv.style.display = 'block';
                    btn.textContent = '收起分析';
                } else {
                    throw new Error('返回数据格式错误');
                }
            } catch (error) {
                clearTimeout(timeoutId);
                console.error('分析失败:', error);
                const errMsg = error.name === 'AbortError' ? '请求超时（>60秒）' : error.message;
                analysisDiv.innerHTML = `<div style="color: #dc3545; padding: 15px;">分析失败：${errMsg}，请重试</div>`;
                analysisDiv.style.display = 'block';
                btn.textContent = originalText;
            } finally {
                btn.disabled = false;
                btn.dataset.loading = '0';
            }
        }

        function resetForm() {
            document.getElementById('formPage').style.display = 'block';
            document.getElementById('resultPage').classList.remove('active');
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('resultContent').style.display = 'none';
            document.getElementById('schoolsResult').innerHTML = '';
            nextStep(1);
        }

        function toggleChat() {
            document.getElementById('chatModal').classList.toggle('active');
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += `
                <div class="chat-message user">
                    <div class="content">${message}</div>
                </div>
            `;
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, message: message })
                });
                const data = await response.json();
                sessionId = data.session_id;

                messagesDiv.innerHTML += `
                    <div class="chat-message assistant">
                        <div class="content">${data.response}</div>
                    </div>
                `;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch (error) {
                console.error('聊天失败:', error);
            }
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') sendChatMessage();
        }

        loadOptions();
    </script>
</body>
</html>
