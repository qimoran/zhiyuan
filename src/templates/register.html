{% extends "base.html" %}

{% block content %}
<section class="page-shell auth-page">
  <div class="auth-panel">
    <div class="auth-copy">
      <h1>注册</h1>
      <p>使用邮箱注册账号。注册成功后会自动登录。</p>
    </div>
    <form class="form-card auth-form" data-register-form novalidate>
      <label class="field">
        <span>邮箱</span>
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <label class="field">
        <span>昵称</span>
        <input name="nickname" type="text" autocomplete="nickname" required>
      </label>
      <label class="field">
        <span>密码</span>
        <input name="password" type="password" autocomplete="new-password" required>
      </label>
      <div class="form-error" data-auth-error></div>
      <button class="btn btn-primary" type="submit">注册并登录</button>
      <p class="auth-switch">已有账号？<a href="/login">去登录</a></p>
    </form>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/register.js') }}" defer></script>
{% endblock %}
