{% extends "base.html" %}

{% block content %}
<section class="page-shell result-page">
  <article class="score-summary" data-score-summary></article>
  <div class="result-stats-bar" data-stats-summary></div>
  <div class="global-warning" data-global-warning hidden></div>
  <section class="recommend-columns" data-result-columns></section>
  <div class="result-actions">
    <a class="btn btn-secondary" href="/recommend">重新推荐</a>
    <button class="btn btn-primary" type="button" data-generate-report>生成推荐报告</button>
    <button class="btn btn-green" type="button" data-save-result>保存结果</button>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/result.js') }}" defer></script>
{% endblock %}
