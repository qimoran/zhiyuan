{% extends "base.html" %}

{% block content %}
<section class="page-shell placeholder-page">
  <div class="page-title-row">
    <div>
      <h1>推荐报告</h1>
      <p>登录后查看个人历史推荐摘要，选择记录后生成 AI 择校建议报告；大模型不可用时自动回退模板报告。</p>
    </div>
    <a class="btn btn-primary" href="/recommend">重新推荐</a>
  </div>
  <section class="report-summary" data-report-summary></section>
  <div class="report-actions">
    <button class="btn btn-primary" type="button" data-report-generate>重新生成 AI 报告</button>
    <button class="btn btn-secondary" type="button" data-report-save>保存到本地</button>
  </div>
  <article class="notice-box" data-report-status>
    报告内容仅供择校参考，正式填报前需要核对高校官网公告。
  </article>
  <article class="report-content" data-report-content></article>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/report.js') }}" defer></script>
{% endblock %}
